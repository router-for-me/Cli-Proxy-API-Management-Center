name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'latest'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all-in-one HTML
        run: npm run build
        env:
          VERSION: ${{ github.ref_name }}

      - name: Prepare release assets
        run: |
          cd dist
          mv index.html management.html
          ls -lh management.html

      - name: Generate release notes
        run: |
          set -euo pipefail
          current_tag="${{ github.ref_name }}"
          if [ "${current_tag}" = "latest" ]; then
            echo "Latest build - ${{ github.sha }}" > release-notes.md
            git log -5 --pretty=format:"- %h %s" >> release-notes.md
          else
            previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"
            if [ -n "${previous_tag}" ]; then
              range="${previous_tag}..${current_tag}"
            else
              range="${current_tag}"
            fi
            : > release-notes.md
            git log --pretty=format:"- %h %s" "${range}" >> release-notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name == 'latest' && 'Latest' || github.ref_name }}
          files: dist/management.html
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
