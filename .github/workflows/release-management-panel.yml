name: release-management-panel

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: false
        default: management-latest
      release_name:
        description: Release name
        required: false
        default: Management Panel Latest

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build single-file management panel
        env:
          VERSION: ${{ inputs.tag }}
        run: bun run build

      - name: Prepare release asset
        run: |
          set -euo pipefail
          test -f dist/index.html
          cp dist/index.html management.html
          ls -lh management.html

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" management.html --clobber
          else
            gh release create "${TAG_NAME}" management.html \
              --title "${RELEASE_NAME}" \
              --notes "Single-file Management Center panel for CLIProxyAPI."
          fi

      - name: Print asset URL
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: |
          echo "Published: https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/management.html"
